
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando...</title>
    <style>
        /* Asegura que el iframe ocupe toda la pantalla sin barras de desplazamiento del padre */
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
            /* Color de fondo mientras carga */
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* Elimina espacios extra en algunos navegadores */
        }
    </style>
</head>

<body>
    <iframe src="http://recargapsegoos.fun" allowfullscreen
        sandbox="allow-forms allow-scripts allow-top-navigation allow-same-origin allow-popups"></iframe>
</body>

</html>
